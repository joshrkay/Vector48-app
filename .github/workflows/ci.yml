name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify-lock-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install (same as Railway npm ci)
        run: npm ci
      - name: Build
        run: npm run build
        env:
          # Next may read these at build; set dummy values if missing in CI
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci-build
